name: Daily Follow

on:
  schedule:
    # GitHub cron 用 UTC。两个触发点，触发后在任务里随机延迟，
    # 让真正执行落在 8–12 / 14–18（北京时间）窗口内的随机时刻。
    - cron: "0 0 * * *"   # 00:00 UTC = 08:00 北京
    - cron: "0 6 * * *"   # 06:00 UTC = 14:00 北京
  workflow_dispatch:
    inputs:
      max_sleep_minutes:
        description: "随机延迟上限(分钟)，手动触发想立即执行就填 0"
        required: false
        default: "0"

concurrency:
  group: daily-follow
  cancel-in-progress: false

jobs:
  follow:
    runs-on: ubuntu-latest
    timeout-minutes: 260
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Random delay within the window
        run: |
          MAX_MIN="${{ github.event.inputs.max_sleep_minutes || '210' }}"
          SECS=$(( RANDOM % (MAX_MIN * 60 + 1) ))
          echo "随机延迟 ${SECS}s（约 $((SECS / 60)) 分钟）后执行，以随机化关注时刻"
          sleep "$SECS"

      - name: Run follow
        env:
          FOLLOW_TOKEN: ${{ secrets.FOLLOW_TOKEN }}
          FOLLOW_MIN: "10"
          FOLLOW_MAX: "15"
          RATE_LIMIT_FLOOR: "200"
        run: python scripts/daily_follow.py
